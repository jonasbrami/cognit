name: "Quizz Grade"
description: "Grade submitted answers comment on a PR and post the results."

inputs:
  version:
    description: "Pinned quizz PyPI version (used when source=pypi)"
    default: "0.1.0"
  source:
    description: "Install source: 'pypi' or 'git' (clones the action's own repo). Use 'git' before v0.1.0 is on PyPI."
    default: "git"
  model:
    description: "LLM model to use for open-question grading"
    default: "gpt-4o-mini"

runs:
  using: "composite"
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v3

    - name: Install quizz
      shell: bash
      run: |
        if [ "${{ inputs.source }}" = "git" ]; then
          # Install from the local checkout of this action's own source repo.
          # $GITHUB_ACTION_PATH points to the dir containing this action.yml,
          # so ../.. is the repo root.
          REPO_ROOT="$(cd "$GITHUB_ACTION_PATH/../.." && pwd)"
          uv tool install --from "$REPO_ROOT" quizz
        else
          uv tool install "quizz==${{ inputs.version }}"
        fi

    - name: Run grader
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        quizz grade \
          --pr "${{ github.event.issue.pull_request.url || github.event.issue.html_url }}" \
          --model "${{ inputs.model }}"
