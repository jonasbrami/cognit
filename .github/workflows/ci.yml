name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history + tags to derive the version
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Vendor frontend assets (mermaid bundle, not committed to git)
        run: uv run python scripts/vendor_mermaid.py
      - name: Lint
        run: uv run ruff check
      - name: Format check
        run: uv run ruff format --check
      - name: Type check
        run: uv run mypy src/
      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium
      - name: Test
        run: uv run pytest -v

  cli-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history + tags to derive the version
      - uses: astral-sh/setup-uv@v3
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli@10
      - name: Install cognit from source
        run: uv tool install --from . cognit
      - name: Verify CLI works
        run: |
          cognit --version
          cognit --help
          cognit take --help
