[project]
name = "quizz"
version = "0.1.0"
description = "Voluntary PR-author comprehension quiz tool"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "typer>=0.12",
    "openai>=1.50",
    "httpx>=0.27",
    "fastapi>=0.136.1",
    "uvicorn>=0.47.0",
    "anthropic>=0.102.0",
]

[project.scripts]
quizz = "quizz.cli:app"

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "respx",
    "syrupy",
    "ruff",
    "mypy",
    "pillow>=12.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quizz"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
strict = true
files = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
